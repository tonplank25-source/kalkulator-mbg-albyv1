            // Kalkulator MBG sederhana dengan efek TSU
            function KalkulatorMBG() {
                const [jumlah, setJumlah] = React.useState('');
                const [hasil, setHasil] = React.useState(null);
                const [isLoading, setIsLoading] = React.useState(false);
                const [tsuEffect, setTsuEffect] = React.useState(false);
                
                // Format angka dengan titik
                const formatAngka = (angka) => {
                    return angka.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
                };
                
                // Parse angka dari string bertitik
                const parseAngka = (str) => {
                    return parseInt(str.replace(/\./g, '')) || 0;
                };
                
                const handleJumlahChange = (e) => {
                    const value = e.target.value.replace(/[^0-9]/g, '');
                    setJumlah(formatAngka(value || '0'));
                };
                
                const handleTSU = () => {
                    if (!jumlah || parseAngka(jumlah) === 0) {
                        alert("Masukkan jumlah uang dulu!");
                        return;
                    }
                    
                    setIsLoading(true);
                    setTsuEffect(true);
                    
                    // Efek TSU: vibrasi (jika support)
                    if (window.navigator && window.navigator.vibrate) {
                        window.navigator.vibrate(50);
                    }
                    
                    // Simulasi proses hitung
                    setTimeout(() => {
                        const totalUang = parseAngka(jumlah);
                        const hargaMBG = 15000; // 15k per porsi
                        const penerima = 60000000; // 60 juta anak sekolah
                        const biayaPerHari = penerima * hargaMBG;
                        let hari = Math.floor(totalUang / biayaPerHari);
                        let sisaUang = totalUang % biayaPerHari;
                        
                        // Hitung detik
                        let detik = Math.floor((sisaUang / biayaPerHari) * 86400);
                        let jam = Math.floor(detik / 3600);
                        let menit = Math.floor((detik % 3600) / 60);
                        let detikSisa = detik % 60;
                        
                        // Hitung tahun & bulan
                        let tahun = Math.floor(hari / 365);
                        let sisaHari = hari % 365;
                        let bulan = Math.floor(sisaHari / 30);
                        let hariSisa = sisaHari % 30;
                        
                        setHasil({
                            hari,
                            tahun,
                            bulan,
                            hariSisa,
                            jam,
                            menit,
                            detik: detikSisa,
                            totalUang,
                            biayaPerHari,
                            penerima
                        });
                        setIsLoading(false);
                        setTimeout(() => setTsuEffect(false), 500);
                    }, 300);
                };
                
                return React.createElement('div', { className: "flex min-h-screen items-center justify-center bg-background p-4" },

                                "Kalkulator MBG 1 Indonesia"

                            React.createElement('p', { className: "text-sm text-muted-foreground" }, "Hitung berapa lama dana bisa memberi MBG ke 60 Juta Anak Sekolah")

                        // Content

                            // Input jumlah
                            React.createElement('div', { className: "space-y-2" },
                                React.createElement('label', { className: "text-sm font-medium leading-none peer-disabled:cursor-not-allowed peer-disabled:opacity-70", htmlFor: "jumlah" }, "Total Dana (Rp)"),
                                React.createElement('div', { className: "relative" },

                                        placeholder: "0",
                                        value: jumlah,
                                        onChange: handleJumlahChange,
                                        inputMode: "numeric"
                                    })
                                )
                            ),
                            // Info tambahan
                            React.createElement('div', { className: "rounded-lg bg-muted/50 p-3 text-sm" },
                                React.createElement('p', { className: "text-muted-foreground mb-1" }, "Data Default:"),
                                React.createElement('p', { className: "text-xs" }, "Penerima: 60.000.000 anak sekolah"),
                                React.createElement('p', { className: "text-xs" }, "Harga MBG: Rp15.000 / orang / hari"),
                                React.createElement('p', { className: "text-xs" }, "Biaya per hari: Rp900.000.000.000 (900 Miliar)")
                            ),
                            // Tombol TSU
                            React.createElement('button', {
                                onClick: handleTSU,
                                disabled: isLoading,
                                className: `w-full bg-primary text-primary-foreground hover:bg-primary/90 h-10 px-4 py-2 rounded-md text-lg font-bold transition-all ${tsuEffect ? 'scale-95' : ''} disabled:opacity-50`
                            },
                                isLoading ? React.createElement('div', { className: "flex items-center justify-center gap-2" },
                                    React.createElement('div', { className: "sonner-loading-wrapper" },
                                        React.createElement('div', { className: "sonner-spinner" },
                                            Array(12).fill(0).map((_, i) => React.createElement('div', { key: i, className: "sonner-loading-bar" }))
                                        )
                                    ),
                                    " Menghitung..."
                                ) : "TSU HITUNG"
                            ),
                            // Hasil
                            hasil && React.createElement('div', { className: "rounded-lg border bg-muted p-6 text-center space-y-4 animate-in fade-in-0 zoom-in-95" },
                                React.createElement('div', null,
                                    React.createElement('p', { className: "text-sm text-muted-foreground mb-1" }, "DANA BERTAHAN"),
                                    React.createElement('p', { className: `text-4xl font-bold ${hasil.hari === 0 ? 'text-destructive' : 'text-foreground'}` }, 
                                        hasil.hari === 0 ? "Kurang dari 1 hari" : formatAngka(hasil.hari) + " hari"
                                    )
                                ),
                                hasil.hari > 0 && React.createElement(React.Fragment, null,
                                    React.createElement('div', { className: "border-t border-border pt-4 space-y-1" },
                                        React.createElement('p', { className: "text-xs text-muted-foreground uppercase tracking-wide mb-2" }, "Setara dengan"),
                                        hasil.tahun > 0 && React.createElement('p', { className: "text-sm" },
                                            React.createElement('span', { className: "font-semibold" }, formatAngka(hasil.tahun)),
                                            " tahun ",
                                            hasil.bulan > 0 && React.createElement(React.Fragment, null,

                                                " bulan"
                                            )
                                        ),

                                            React.createElement('p', { className: "text-xs text-muted-foreground mb-1" }, "Atau tepatnya:"),
                                            React.createElement('p', { className: "text-base font-semibold font-mono" },

                                                hasil.detik > 0 && React.createElement(React.Fragment, null, hasil.detik, " detik")
                                            )
                                        )
                                    )
                                ),
                                hasil.hari === 0 && React.createElement('div', { className: "mt-3 rounded-md bg-destructive/10 p-3" },
                                    React.createElement('p', { className: "text-sm text-destructive" }, 
                                        `Dana Rp${formatAngka(hasil.totalUang)} tidak cukup untuk 1 hari!`
                                    )
                                ),
                                React.createElement('div', { className: "text-xs text-muted-foreground mt-2" },
                                    `Total: Rp${formatAngka(hasil.totalUang)} | Biaya/hari: Rp${formatAngka(hasil.biayaPerHari)}`
                                )
                            )
                        ),
                        // Footer
                        React.createElement('div', { className: "p-6 pt-0 text-center text-xs text-muted-foreground border-t mt-4" },
                            "Kalkulator ini menghitung untuk 60 Juta penerima (anak sekolah) | 1,2 Triliun Rupiah = 1 Hari MBG"
                        )

                );
            }
            
            // Simple React render (menggunakan React dari CDN)
            function App() {
                return React.createElement(KalkulatorMBG, null);
            }
            
            // Load React dari CDN dulu
            function loadScript(src) {
                return new Promise((resolve, reject) => {
                    const script = document.createElement('script');
                    script.src = src;
                    script.onload = resolve;
                    script.onerror = reject;
                    document.head.appendChild(script);
                });
            }
            
            // Load React dan ReactDOM
            Promise.all([
                loadScript('https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js'),
                loadScript('https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js')

                const root = ReactDOM.createRoot(rootElement);
                root.render(React.createElement(App));
            }).catch(err => {
                console.error('Failed to load React:', err);
                // Fallback manual render
                rootElement.innerHTML = `

                            <p class="text-center text-muted-foreground">Gagal memuat aplikasi. Silakan refresh halaman.</p>
                        </div>
                    </div>
                `;
            });
        })();
    </script>
